<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="100%" stop-color="#05070d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#c8a25a" stop-opacity="0.22"/>
      <stop offset="65%" stop-color="#c8a25a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- hairline grid accent -->
  <g stroke="#c8a25a" stroke-opacity="0.09" stroke-width="1">
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
  </g>

  <!-- brand mark -->
  <g transform="translate(600 220)">
    <rect x="-50" y="-50" width="100" height="100" rx="14" fill="#0b0f1a" stroke="#c8a25a" stroke-width="2"/>
    <text x="0" y="18" font-family="Cinzel, Georgia, serif" font-size="72" font-weight="700" fill="#c8a25a" text-anchor="middle">S</text>
  </g>

  <!-- title -->
  <text x="600" y="400" font-family="Cinzel, Georgia, serif" font-size="108" font-weight="700" letter-spacing="4" text-anchor="middle">
    <tspan fill="#ebe3d1">Stat</tspan><tspan fill="#c8a25a">Rift</tspan>
  </text>

  <!-- subtitle -->
  <text x="600" y="465" font-family="Inter, system-ui, sans-serif" font-size="26" fill="#9aa1b2" text-anchor="middle" letter-spacing="1">
    League of Legends trivia — how well do you know the roster?
  </text>

  <!-- eyebrow bar -->
  <text x="600" y="545" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#c8a25a" text-anchor="middle" letter-spacing="6" font-weight="600">
    HIGHER · LOWER · FOG OF WAR
  </text>
</svg>
